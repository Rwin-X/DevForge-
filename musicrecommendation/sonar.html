<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sonar — Find similar music</title>
<style>
  :root{
    --paper:      #ffffff;
    --paper-soft: #f5faf7;
    --ink:        #0d1f16;
    --ink-soft:   #5b6b62;
    --green:      #1c7a4d;
    --green-deep: #0f5c39;
    --green-glow: #2fbf7f;
    --line:       #d9ece2;
    --shadow:     rgba(15, 92, 57, 0.10);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Söhne', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  body{
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 64px 20px 80px;
  }

  /* ---------- Signature: the pulse-bar wordmark ---------- */
  .brand{
    display:flex;
    align-items:center;
    gap:14px;
    margin-bottom: 6px;
  }

  .pulse{
    display:flex;
    align-items:flex-end;
    gap:3px;
    height: 26px;
  }

  .pulse span{
    width: 4px;
    background: var(--green);
    border-radius: 2px;
    animation: bounce 1.4s ease-in-out infinite;
  }
  .pulse span:nth-child(1){ height: 40%; animation-delay: 0s; }
  .pulse span:nth-child(2){ height: 100%; animation-delay: .15s; }
  .pulse span:nth-child(3){ height: 65%; animation-delay: .3s; }
  .pulse span:nth-child(4){ height: 85%; animation-delay: .45s; }
  .pulse span:nth-child(5){ height: 50%; animation-delay: .6s; }

  @keyframes bounce{
    0%, 100% { transform: scaleY(0.4); }
    50% { transform: scaleY(1); }
  }

  .wordmark{
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--ink);
  }
  .wordmark em{
    font-style: normal;
    color: var(--green);
  }

  .tagline{
    color: var(--ink-soft);
    font-size: 15px;
    margin: 0 0 44px;
    text-align: center;
    max-width: 420px;
    line-height: 1.5;
  }

  /* ---------- Search ---------- */
  .search-wrap{
    width: 100%;
    max-width: 560px;
    position: relative;
  }

  .search-box{
    display:flex;
    align-items:center;
    gap: 12px;
    background: var(--paper);
    border: 1.5px solid var(--line);
    border-radius: 14px;
    padding: 6px 8px 6px 20px;
    transition: border-color .2s ease, box-shadow .2s ease;
  }

  .search-box:focus-within{
    border-color: var(--green);
    box-shadow: 0 0 0 4px var(--shadow);
  }

  .search-box svg{
    flex-shrink: 0;
    color: var(--ink-soft);
  }

  #query{
    flex: 1;
    border: none;
    outline: none;
    background: transparent;
    font-size: 16px;
    color: var(--ink);
    padding: 14px 0;
    font-family: inherit;
  }

  #query::placeholder{ color: #9aab9f; }

  #searchBtn{
    border: none;
    background: var(--green);
    color: white;
    font-weight: 600;
    font-size: 14.5px;
    padding: 13px 22px;
    border-radius: 10px;
    cursor: pointer;
    transition: background .15s ease, transform .1s ease;
    white-space: nowrap;
    font-family: inherit;
  }
  #searchBtn:hover{ background: var(--green-deep); }
  #searchBtn:active{ transform: scale(0.97); }
  #searchBtn:disabled{ background: #a9c9b8; cursor: not-allowed; }

  .hint{
    font-size: 12.5px;
    color: var(--ink-soft);
    margin-top: 10px;
    padding-left: 4px;
  }

  /* ---------- Seed track (the song you gave) ---------- */
  #seedCard{
    width: 100%;
    max-width: 560px;
    margin-top: 28px;
    display: none;
  }

  .seed-label{
    font-size: 11.5px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--green);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .seed-label::after{
    content: "";
    flex: 1;
    height: 1px;
    background: var(--line);
  }

  .seed-row{
    display:flex;
    align-items:center;
    gap: 16px;
    background: var(--paper-soft);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 14px;
  }

  .seed-row img{
    width: 56px;
    height: 56px;
    border-radius: 8px;
    object-fit: cover;
    flex-shrink: 0;
  }

  .seed-meta strong{
    display:block;
    font-size: 15px;
    font-weight: 650;
  }
  .seed-meta span{
    font-size: 13px;
    color: var(--ink-soft);
  }

  /* ---------- Results ---------- */
  #results{
    width: 100%;
    max-width: 560px;
    margin-top: 32px;
  }

  .results-label{
    font-size: 11.5px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 14px;
  }

  .track{
    display:flex;
    align-items:center;
    gap: 16px;
    padding: 12px 8px;
    border-radius: 12px;
    transition: background .15s ease;
    cursor: default;
  }
  .track:hover{ background: var(--paper-soft); }

  .track img{
    width: 52px;
    height: 52px;
    border-radius: 8px;
    object-fit: cover;
    flex-shrink: 0;
    background: var(--paper-soft);
  }

  .track-info{
    flex: 1;
    min-width: 0;
  }
  .track-info strong{
    display:block;
    font-size: 14.5px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .track-info span{
    font-size: 13px;
    color: var(--ink-soft);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    display: block;
  }

  .track-genre{
    font-size: 11px;
    color: var(--green-deep);
    background: #e6f5ec;
    padding: 3px 9px;
    border-radius: 100px;
    font-weight: 600;
    flex-shrink: 0;
    white-space: nowrap;
  }

  .play-btn{
    width: 38px;
    height: 38px;
    border-radius: 50%;
    border: 1.5px solid var(--line);
    background: var(--paper);
    color: var(--green);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor: pointer;
    flex-shrink: 0;
    transition: all .15s ease;
  }
  .play-btn:hover{ border-color: var(--green); background: var(--green); color: white; }
  .play-btn.playing{ background: var(--green); color: white; border-color: var(--green); }
  .play-btn:disabled{ opacity: 0.3; cursor: not-allowed; }

  .divider-row{
    height: 1px;
    background: var(--line);
    margin: 2px 0;
  }

  /* ---------- States ---------- */
  #status{
    width: 100%;
    max-width: 560px;
    text-align: center;
    color: var(--ink-soft);
    font-size: 14px;
    margin-top: 36px;
    display: none;
    line-height: 1.6;
  }

  .spinner{
    width: 22px;
    height: 22px;
    border: 2.5px solid var(--line);
    border-top-color: var(--green);
    border-radius: 50%;
    margin: 0 auto 14px;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin{ to{ transform: rotate(360deg); } }

  footer{
    margin-top: auto;
    padding-top: 60px;
    font-size: 12px;
    color: #a9b9af;
    text-align: center;
  }

  @media (max-width: 480px){
    body{ padding: 40px 16px 60px; }
    .wordmark{ font-size: 22px; }
    #query{ font-size: 15px; }
    #searchBtn{ padding: 12px 16px; font-size: 13.5px; }
  }
</style>
</head>
<body>

  <div class="brand">
    <div class="pulse">
      <span></span><span></span><span></span><span></span><span></span>
    </div>
    <div class="wordmark">Son<em>ar</em></div>
  </div>
  <p class="tagline">Type a song you love. Sonar listens for its shape — artist, genre, era — and finds tracks that echo it.</p>

  <div class="search-wrap">
    <div class="search-box">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
      <input type="text" id="query" placeholder="Song title, or artist — song" autocomplete="off">
      <button id="searchBtn">Find similar</button>
    </div>
    <div class="hint">Try "Redbone" or "Tame Impala — The Less I Know The Better"</div>
  </div>

  <div id="seedCard">
    <div class="seed-label">You picked</div>
    <div class="seed-row" id="seedRow"></div>
  </div>

  <div id="status">
    <div class="spinner"></div>
    <div id="statusText">Searching…</div>
  </div>

  <div id="results"></div>

  <footer>Powered by the iTunes Search API · previews are 30-second clips</footer>

<script>
(function(){
  const queryInput   = document.getElementById('query');
  const searchBtn    = document.getElementById('searchBtn');
  const seedCard     = document.getElementById('seedCard');
  const seedRow      = document.getElementById('seedRow');
  const resultsEl    = document.getElementById('results');
  const statusEl     = document.getElementById('status');
  const statusText   = document.getElementById('statusText');

  let currentAudio = null;
  let currentPlayBtn = null;

  function setStatus(visible, text){
    statusEl.style.display = visible ? 'block' : 'none';
    if(text) statusText.textContent = text;
  }

  function clearResults(){
    resultsEl.innerHTML = '';
    seedCard.style.display = 'none';
  }

  function highResArtwork(url){
    // iTunes gives small thumbnails by default; request a bigger version
    return url ? url.replace('100x100bb', '300x300bb') : '';
  }

  async function itunesSearch(term, entity, limit){
    const url = 'https://itunes.apple.com/search?term=' + encodeURIComponent(term) +
                '&media=music&entity=' + (entity || 'song') +
                '&limit=' + (limit || 25);
    const res = await fetch(url);
    if(!res.ok) throw new Error('Network error while searching');
    return res.json();
  }

  async function lookupByArtistId(artistId, limit){
    const url = 'https://itunes.apple.com/lookup?id=' + artistId +
                '&entity=song&limit=' + (limit || 30);
    const res = await fetch(url);
    if(!res.ok) throw new Error('Network error while looking up artist');
    return res.json();
  }

  function stopPlayback(){
    if(currentAudio){
      currentAudio.pause();
      currentAudio.currentTime = 0;
    }
    if(currentPlayBtn){
      currentPlayBtn.classList.remove('playing');
      currentPlayBtn.innerHTML = playIcon();
    }
    currentAudio = null;
    currentPlayBtn = null;
  }

  function playIcon(){
    return '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';
  }
  function pauseIcon(){
    return '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="5" width="4" height="14"/><rect x="14" y="5" width="4" height="14"/></svg>';
  }

  function togglePreview(url, btn){
    if(!url){ return; }

    if(currentAudio && currentPlayBtn === btn){
      // same track: toggle pause/resume
      if(currentAudio.paused){
        currentAudio.play();
        btn.classList.add('playing');
        btn.innerHTML = pauseIcon();
      } else {
        currentAudio.pause();
        btn.classList.remove('playing');
        btn.innerHTML = playIcon();
      }
      return;
    }

    // different track: stop old, start new
    stopPlayback();
    currentAudio = new Audio(url);
    currentPlayBtn = btn;
    currentAudio.play();
    btn.classList.add('playing');
    btn.innerHTML = pauseIcon();

    currentAudio.addEventListener('ended', () => {
      btn.classList.remove('playing');
      btn.innerHTML = playIcon();
      currentAudio = null;
      currentPlayBtn = null;
    });
  }

  function renderSeed(track){
    seedRow.innerHTML = '';
    const img = document.createElement('img');
    img.src = highResArtwork(track.artworkUrl100) || '';
    img.alt = track.trackName || 'Artwork';

    const meta = document.createElement('div');
    meta.className = 'seed-meta';
    const strong = document.createElement('strong');
    strong.textContent = track.trackName || 'Unknown title';
    const span = document.createElement('span');
    span.textContent = (track.artistName || 'Unknown artist') + (track.primaryGenreName ? ' · ' + track.primaryGenreName : '');
    meta.appendChild(strong);
    meta.appendChild(span);

    seedRow.appendChild(img);
    seedRow.appendChild(meta);
    seedCard.style.display = 'block';
  }

  function renderResults(tracks, excludeTrackId){
    resultsEl.innerHTML = '';

    const label = document.createElement('div');
    label.className = 'results-label';
    label.textContent = tracks.length ? 'Similar tracks' : '';
    resultsEl.appendChild(label);

    const seen = new Set();
    let count = 0;

    tracks.forEach((t) => {
      if(!t.trackId || t.trackId === excludeTrackId) return;
      const key = (t.trackName || '') + '::' + (t.artistName || '');
      if(seen.has(key)) return;
      seen.add(key);
      count++;

      const row = document.createElement('div');
      row.className = 'track';

      const img = document.createElement('img');
      img.src = highResArtwork(t.artworkUrl100) || '';
      img.alt = t.trackName || 'Artwork';
      img.loading = 'lazy';

      const info = document.createElement('div');
      info.className = 'track-info';
      const strong = document.createElement('strong');
      strong.textContent = t.trackName || 'Unknown title';
      const span = document.createElement('span');
      span.textContent = t.artistName || 'Unknown artist';
      info.appendChild(strong);
      info.appendChild(span);

      const genre = document.createElement('div');
      genre.className = 'track-genre';
      genre.textContent = t.primaryGenreName || '—';

      const playBtn = document.createElement('button');
      playBtn.className = 'play-btn';
      playBtn.innerHTML = playIcon();
      playBtn.title = t.previewUrl ? 'Play 30s preview' : 'No preview available';
      if(!t.previewUrl) playBtn.disabled = true;
      playBtn.addEventListener('click', () => togglePreview(t.previewUrl, playBtn));

      row.appendChild(img);
      row.appendChild(info);
      row.appendChild(genre);
      row.appendChild(playBtn);
      resultsEl.appendChild(row);

      if(count < tracks.length){
        const div = document.createElement('div');
        div.className = 'divider-row';
        resultsEl.appendChild(div);
      }
    });

    if(count === 0){
      label.textContent = '';
      const empty = document.createElement('div');
      empty.style.textAlign = 'center';
      empty.style.color = 'var(--ink-soft)';
      empty.style.fontSize = '14px';
      empty.style.padding = '20px 0';
      empty.textContent = 'No similar tracks found. Try a different song.';
      resultsEl.appendChild(empty);
    }
  }

  function parseQuery(raw){
    // Supports "Artist — Song" or "Artist - Song" as well as a plain title/search
    const dashSplit = raw.split(/\s+[-–—]\s+/);
    if(dashSplit.length === 2){
      return { artist: dashSplit[0].trim(), title: dashSplit[1].trim(), combined: raw.trim() };
    }
    return { artist: null, title: null, combined: raw.trim() };
  }

  async function findSimilar(){
    const raw = queryInput.value.trim();
    if(!raw){
      queryInput.focus();
      return;
    }

    stopPlayback();
    clearResults();
    setStatus(true, 'Looking up the track…');
    searchBtn.disabled = true;

    try{
      const parsed = parseQuery(raw);
      const searchTerm = parsed.combined;

      const seedData = await itunesSearch(searchTerm, 'song', 5);
      const seedResults = (seedData && seedData.results) || [];

      if(seedResults.length === 0){
        setStatus(true, 'Could not find that song. Try a different spelling, or include the artist name.');
        searchBtn.disabled = false;
        return;
      }

      const seedTrack = seedResults[0];
      renderSeed(seedTrack);

      setStatus(true, 'Finding tracks that sound like this…');

      const genre = seedTrack.primaryGenreName;
      const artistId = seedTrack.artistId;
      const artistName = seedTrack.artistName;

      // Two strategies combined for a richer "similar music" pool:
      // 1) Other songs by the same artist (same sonic fingerprint)
      // 2) Songs in the same genre (broader neighborhood)
      const [artistData, genreData] = await Promise.all([
        artistId ? lookupByArtistId(artistId, 15).catch(() => ({ results: [] })) : Promise.resolve({ results: [] }),
        genre ? itunesSearch(genre, 'song', 40).catch(() => ({ results: [] })) : Promise.resolve({ results: [] })
      ]);

      const artistTracks = ((artistData && artistData.results) || []).filter(r => r.wrapperType === 'track');
      const genreTracksRaw = ((genreData && genreData.results) || []);

      // Prefer genre tracks that are NOT by the same artist, so results feel like discovery
      // rather than just "more of the same artist" — but still weave in a few same-artist picks.
      const genreTracks = genreTracksRaw.filter(r => r.artistName !== artistName);

      // Shuffle genre pool lightly for variety, then take a slice
      for(let i = genreTracks.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [genreTracks[i], genreTracks[j]] = [genreTracks[j], genreTracks[i]];
      }

      const combined = [
        ...artistTracks.slice(0, 6),
        ...genreTracks.slice(0, 14)
      ];

      setStatus(false);
      renderResults(combined, seedTrack.trackId);

    } catch(err){
      console.error(err);
      setStatus(true, 'Something went wrong reaching the music database. Please try again.');
    } finally{
      searchBtn.disabled = false;
    }
  }

  searchBtn.addEventListener('click', findSimilar);
  queryInput.addEventListener('keydown', (e) => {
    if(e.key === 'Enter') findSimilar();
  });
})();
</script>

</body>
</html>
