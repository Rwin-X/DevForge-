<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SONIC RADAR — Music Discovery Engine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-0: #F7F8FA;
    --bg-1: #FFFFFF;
    --glass: rgba(255,255,255,0.55);
    --glass-strong: rgba(255,255,255,0.75);
    --glass-border: rgba(255,255,255,0.9);
    --line: #E4E7ED;
    --ink: #1A1D29;
    --ink-soft: #545B6E;
    --ink-faint: #8891A5;
    --accent: #6C5CE7;
    --accent-soft: #A29BFE;
    --accent-glow: rgba(108,92,231,0.18);
    --energy-hi: #FF7A7A;
    --energy-mid: #6C5CE7;
    --energy-lo: #6BCB9E;
    --radius-lg: 24px;
    --radius-md: 16px;
    --radius-sm: 10px;
    --shadow-soft: 0 8px 32px rgba(30,34,54,0.06);
    --shadow-lift: 0 16px 48px rgba(30,34,54,0.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background:
      radial-gradient(circle at 15% 0%, #EFEAFE 0%, transparent 45%),
      radial-gradient(circle at 85% 15%, #E8F7F0 0%, transparent 40%),
      linear-gradient(180deg, var(--bg-1) 0%, var(--bg-0) 100%);
    background-attachment: fixed;
    color: var(--ink);
    min-height: 100vh;
    padding: 48px 24px 80px;
  }

  .wrap { max-width: 960px; margin: 0 auto; }

  /* ---------- Header ---------- */
  header { text-align: center; margin-bottom: 40px; }

  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.25em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 14px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .eyebrow::before, .eyebrow::after {
    content: '';
    width: 22px;
    height: 1px;
    background: var(--accent-soft);
  }

  h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: clamp(32px, 5vw, 48px);
    letter-spacing: -0.02em;
    margin-bottom: 10px;
  }

  .subtitle {
    color: var(--ink-faint);
    font-size: 15px;
    font-weight: 400;
    max-width: 480px;
    margin: 0 auto;
  }

  /* ---------- Search ---------- */
  .search-shell {
    position: relative;
    margin: 36px auto 8px;
    max-width: 620px;
  }

  .search-glass {
    background: var(--glass-strong);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border: 1px solid var(--glass-border);
    border-radius: 999px;
    box-shadow: var(--shadow-soft);
    display: flex;
    align-items: center;
    padding: 6px 6px 6px 24px;
    transition: box-shadow 0.3s ease, transform 0.3s ease;
  }
  .search-glass:focus-within {
    box-shadow: var(--shadow-lift), 0 0 0 4px var(--accent-glow);
    transform: translateY(-1px);
  }

  .search-icon { flex-shrink: 0; color: var(--ink-faint); }

  #searchInput {
    flex: 1;
    border: none;
    outline: none;
    background: transparent;
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    color: var(--ink);
    padding: 14px 12px;
  }
  #searchInput::placeholder { color: var(--ink-faint); }

  #searchBtn {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    font-size: 14px;
    background: var(--ink);
    color: #fff;
    border: none;
    border-radius: 999px;
    padding: 12px 24px;
    cursor: pointer;
    transition: background 0.25s ease, transform 0.15s ease;
    white-space: nowrap;
  }
  #searchBtn:hover { background: var(--accent); }
  #searchBtn:active { transform: scale(0.97); }

  .search-hint {
    text-align: center;
    font-size: 12px;
    color: var(--ink-faint);
    margin-top: 12px;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.02em;
  }

  /* ---------- Status / loading ---------- */
  .status-line {
    display: none;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin: 28px 0;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--ink-faint);
  }
  .status-line.active { display: flex; }

  .pulse-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 1.1s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.3; transform: scale(0.85); }
    50% { opacity: 1; transform: scale(1.1); }
  }

  .error-box {
    display: none;
    max-width: 560px;
    margin: 24px auto;
    padding: 16px 20px;
    background: rgba(255,122,122,0.08);
    border: 1px solid rgba(255,122,122,0.25);
    border-radius: var(--radius-md);
    color: #C44545;
    font-size: 14px;
    text-align: center;
  }
  .error-box.active { display: block; }

  /* ---------- Seed card ---------- */
  #seedSection { display: none; margin-top: 36px; }
  #seedSection.active { display: block; animation: riseIn 0.5s ease both; }

  @keyframes riseIn {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .section-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 14px;
    padding-left: 4px;
  }

  .seed-card {
    background: var(--glass);
    backdrop-filter: blur(24px) saturate(180%);
    -webkit-backdrop-filter: blur(24px) saturate(180%);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-soft);
    padding: 28px;
    display: flex;
    gap: 22px;
    align-items: center;
  }

  .seed-art {
    width: 92px; height: 92px;
    border-radius: var(--radius-md);
    object-fit: cover;
    flex-shrink: 0;
    box-shadow: 0 6px 20px rgba(30,34,54,0.14);
  }

  .seed-info { flex: 1; min-width: 0; }

  .seed-title {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    font-size: 20px;
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .seed-artist {
    color: var(--ink-soft);
    font-size: 14px;
    margin-bottom: 10px;
  }
  .seed-tags {
    display: flex; gap: 8px; flex-wrap: wrap;
  }
  .tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
    letter-spacing: 0.03em;
    padding: 4px 10px;
    border-radius: 999px;
    background: rgba(108,92,231,0.09);
    color: var(--accent);
    border: 1px solid rgba(108,92,231,0.15);
  }

  .play-btn {
    flex-shrink: 0;
    width: 56px; height: 56px;
    border-radius: 50%;
    border: none;
    background: var(--ink);
    color: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.25s ease, transform 0.15s ease;
  }
  .play-btn:hover { background: var(--accent); transform: scale(1.05); }
  .play-btn svg { width: 18px; height: 18px; }
  .play-btn.playing { background: var(--accent); }

  /* ---------- Results grid ---------- */
  #resultsSection { display: none; margin-top: 44px; }
  #resultsSection.active { display: block; animation: riseIn 0.5s ease 0.1s both; }

  .results-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
  }

  .rec-card {
    background: var(--glass);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-md);
    box-shadow: var(--shadow-soft);
    padding: 18px;
    transition: transform 0.25s ease, box-shadow 0.25s ease;
    position: relative;
    overflow: hidden;
  }
  .rec-card:hover {
    transform: translateY(-3px);
    box-shadow: var(--shadow-lift);
  }

  .rec-top { display: flex; gap: 14px; margin-bottom: 14px; }

  .rec-art {
    width: 58px; height: 58px;
    border-radius: var(--radius-sm);
    object-fit: cover;
    flex-shrink: 0;
    box-shadow: 0 4px 14px rgba(30,34,54,0.12);
  }

  .rec-info { min-width: 0; flex: 1; }
  .rec-title {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    font-size: 14.5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .rec-artist {
    font-size: 12.5px;
    color: var(--ink-soft);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 2px;
  }
  .rec-genre {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ink-faint);
    margin-top: 4px;
    letter-spacing: 0.02em;
  }

  .match-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }
  .match-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ink-faint);
    width: 46px;
    flex-shrink: 0;
  }
  .match-track {
    flex: 1;
    height: 5px;
    background: var(--line);
    border-radius: 999px;
    overflow: hidden;
  }
  .match-fill {
    height: 100%;
    border-radius: 999px;
    background: linear-gradient(90deg, var(--accent-soft), var(--accent));
    width: 0%;
    transition: width 1s cubic-bezier(0.22, 1, 0.36, 1);
    position: relative;
    overflow: hidden;
  }
  .match-fill::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
    animation: shimmer 1.8s ease-in-out infinite;
  }
  @keyframes shimmer {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
  }
  .match-pct {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    color: var(--accent);
    width: 34px;
    text-align: right;
    flex-shrink: 0;
  }

  .rec-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--line);
  }

  .mood-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.03em;
    color: var(--ink-faint);
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .mood-dot { width: 6px; height: 6px; border-radius: 50%; }

  .mini-play {
    width: 32px; height: 32px;
    border-radius: 50%;
    border: 1px solid var(--line);
    background: var(--glass-strong);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
  }
  .mini-play:hover { border-color: var(--accent); background: var(--accent); }
  .mini-play:hover svg { fill: #fff; }
  .mini-play svg { width: 11px; height: 11px; fill: var(--ink-soft); transition: fill 0.2s ease; }
  .mini-play.playing { background: var(--accent); border-color: var(--accent); }
  .mini-play.playing svg { fill: #fff; }

  .no-preview {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9.5px;
    color: var(--ink-faint);
    opacity: 0.6;
  }

  /* ---------- Empty state ---------- */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--ink-faint);
  }
  .empty-state svg { margin-bottom: 16px; opacity: 0.5; }
  .empty-state p { font-size: 14px; }

  /* ---------- Footer ---------- */
  footer {
    text-align: center;
    margin-top: 64px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-faint);
    letter-spacing: 0.05em;
  }

  @media (max-width: 560px) {
    body { padding: 32px 16px 60px; }
    .seed-card { flex-wrap: wrap; }
    .seed-art { width: 72px; height: 72px; }
  }

  ::selection { background: var(--accent-glow); }
</style>
</head>
<body>

<div class="wrap">

  <header>
    <div class="eyebrow">Sonic Radar</div>
    <h1>Find your next favorite track</h1>
    <p class="subtitle">Type a song or artist. Radar cross-references genre, mood and energy to surface real sonic neighbors — with instant previews.</p>
  </header>

  <div class="search-shell">
    <div class="search-glass">
      <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <circle cx="11" cy="11" r="7"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
      <input type="text" id="searchInput" placeholder="e.g. Nine Inch Nails, Blade Runner Blues, Boards of Canada…" autocomplete="off">
      <button id="searchBtn">Search</button>
    </div>
    <div class="search-hint">Powered by the iTunes catalog · 30-second previews</div>
  </div>

  <div class="status-line" id="statusLine">
    <div class="pulse-dot"></div>
    <span id="statusText">Scanning the catalog…</span>
  </div>

  <div class="error-box" id="errorBox"></div>

  <section id="seedSection">
    <div class="section-label">Seed track</div>
    <div class="seed-card" id="seedCard"></div>
  </section>

  <section id="resultsSection">
    <div class="section-label">Sonic neighbors</div>
    <div class="results-grid" id="resultsGrid"></div>
  </section>

</div>

<audio id="audioPlayer"></audio>

<script>
(function() {
  const searchInput = document.getElementById('searchInput');
  const searchBtn = document.getElementById('searchBtn');
  const statusLine = document.getElementById('statusLine');
  const statusText = document.getElementById('statusText');
  const errorBox = document.getElementById('errorBox');
  const seedSection = document.getElementById('seedSection');
  const seedCard = document.getElementById('seedCard');
  const resultsSection = document.getElementById('resultsSection');
  const resultsGrid = document.getElementById('resultsGrid');
  const audioPlayer = document.getElementById('audioPlayer');

  let currentPlayingBtn = null;

  // ---------- Mood / energy heuristics ----------
  // iTunes exposes no audio-feature data (tempo/energy/valence), so we derive
  // an approximate mood + energy profile from genre and title keywords.
  // This is a heuristic layer, not measured audio analysis.
  const GENRE_PROFILES = {
    'ambient':          { energy: 0.15, mood: 'calm',      color: '#6BCB9E' },
    'industrial':       { energy: 0.85, mood: 'dark',      color: '#FF7A7A' },
    'dark ambient':     { energy: 0.20, mood: 'dark',      color: '#8891A5' },
    'electronic':       { energy: 0.60, mood: 'driving',   color: '#6C5CE7' },
    'techno':           { energy: 0.80, mood: 'driving',   color: '#6C5CE7' },
    'house':            { energy: 0.70, mood: 'upbeat',    color: '#FFB86C' },
    'idm':              { energy: 0.55, mood: 'cerebral',  color: '#A29BFE' },
    'downtempo':        { energy: 0.30, mood: 'calm',      color: '#6BCB9E' },
    'trip-hop':         { energy: 0.35, mood: 'moody',     color: '#8891A5' },
    'metal':            { energy: 0.90, mood: 'aggressive',color: '#FF7A7A' },
    'rock':             { energy: 0.70, mood: 'driving',   color: '#FF9F7A' },
    'alternative':      { energy: 0.60, mood: 'moody',     color: '#8891A5' },
    'post-punk':        { energy: 0.65, mood: 'dark',      color: '#8891A5' },
    'gothic':           { energy: 0.55, mood: 'dark',      color: '#8891A5' },
    'synth-pop':        { energy: 0.65, mood: 'upbeat',    color: '#FFB86C' },
    'synthwave':        { energy: 0.60, mood: 'nostalgic', color: '#A29BFE' },
    'classical':        { energy: 0.35, mood: 'calm',      color: '#6BCB9E' },
    'soundtrack':       { energy: 0.40, mood: 'cinematic', color: '#A29BFE' },
    'jazz':             { energy: 0.40, mood: 'smooth',    color: '#FFB86C' },
    'hip-hop/rap':      { energy: 0.65, mood: 'confident', color: '#FFB86C' },
    'pop':              { energy: 0.65, mood: 'upbeat',    color: '#FFB86C' },
    'folk':             { energy: 0.30, mood: 'warm',      color: '#6BCB9E' },
    'indie':            { energy: 0.50, mood: 'moody',     color: '#A29BFE' },
    'r&b/soul':         { energy: 0.45, mood: 'smooth',    color: '#FFB86C' },
    'dance':            { energy: 0.80, mood: 'upbeat',    color: '#FFB86C' },
    'experimental':     { energy: 0.50, mood: 'cerebral',  color: '#A29BFE' },
    'noise':            { energy: 0.85, mood: 'aggressive',color: '#FF7A7A' },
    'punk':             { energy: 0.85, mood: 'aggressive',color: '#FF7A7A' },
  };
  const DEFAULT_PROFILE = { energy: 0.5, mood: 'balanced', color: '#8891A5' };

  function profileFor(genre) {
    if (!genre) return DEFAULT_PROFILE;
    const key = genre.toLowerCase();
    if (GENRE_PROFILES[key]) return GENRE_PROFILES[key];
    // partial match fallback
    for (const g in GENRE_PROFILES) {
      if (key.includes(g) || g.includes(key)) return GENRE_PROFILES[g];
    }
    return DEFAULT_PROFILE;
  }

  // ---------- Similarity scoring ----------
  function similarityScore(seed, candidate) {
    let score = 0;

    // Same artist is a strong but not exclusive signal
    if (candidate.artistName.toLowerCase() === seed.artistName.toLowerCase()) {
      score += 25;
    }

    // Genre match
    const seedGenre = (seed.primaryGenreName || '').toLowerCase();
    const candGenre = (candidate.primaryGenreName || '').toLowerCase();
    if (seedGenre && candGenre) {
      if (seedGenre === candGenre) score += 35;
      else if (seedGenre.includes(candGenre) || candGenre.includes(seedGenre)) score += 20;
    }

    // Mood / energy proximity from heuristic profile
    const seedProfile = profileFor(seed.primaryGenreName);
    const candProfile = profileFor(candidate.primaryGenreName);
    const energyDelta = Math.abs(seedProfile.energy - candProfile.energy);
    score += Math.max(0, 25 - energyDelta * 60);
    if (seedProfile.mood === candProfile.mood) score += 10;

    // Release era proximity (soft signal)
    if (seed.releaseDate && candidate.releaseDate) {
      const yearDiff = Math.abs(
        new Date(seed.releaseDate).getFullYear() - new Date(candidate.releaseDate).getFullYear()
      );
      score += Math.max(0, 5 - yearDiff / 3);
    }

    return Math.min(99, Math.max(35, Math.round(score)));
  }

  // ---------- iTunes fetch helpers ----------
  async function itunesSearch(term, entity, limit) {
    const url = 'https://itunes.apple.com/search?term=' + encodeURIComponent(term) +
                '&entity=' + entity + '&limit=' + limit;
    const res = await fetch(url);
    if (!res.ok) throw new Error('iTunes request failed (' + res.status + ')');
    const data = await res.json();
    return data.results || [];
  }

  function hiResArt(url) {
    if (!url) return 'https://via.placeholder.com/300x300/F7F8FA/8891A5?text=%E2%99%AA';
    return url.replace('100x100', '300x300');
  }

  function formatDuration(ms) {
    if (!ms) return '';
    const totalSec = Math.floor(ms / 1000);
    const min = Math.floor(totalSec / 60);
    const sec = totalSec % 60;
    return min + ':' + String(sec).padStart(2, '0');
  }

  // ---------- Playback ----------
  function togglePlay(btn, previewUrl) {
    if (!previewUrl) return;

    if (currentPlayingBtn === btn && !audioPlayer.paused) {
      audioPlayer.pause();
      btn.classList.remove('playing');
      setIconPlay(btn);
      currentPlayingBtn = null;
      return;
    }

    if (currentPlayingBtn) {
      currentPlayingBtn.classList.remove('playing');
      setIconPlay(currentPlayingBtn);
    }

    audioPlayer.src = previewUrl;
    audioPlayer.play();
    btn.classList.add('playing');
    setIconPause(btn);
    currentPlayingBtn = btn;
  }

  audioPlayer.addEventListener('ended', () => {
    if (currentPlayingBtn) {
      currentPlayingBtn.classList.remove('playing');
      setIconPlay(currentPlayingBtn);
      currentPlayingBtn = null;
    }
  });

  function setIconPlay(btn) {
    btn.innerHTML = btn.dataset.size === 'lg' ? ICON_PLAY_LG : ICON_PLAY_SM;
  }
  function setIconPause(btn) {
    btn.innerHTML = btn.dataset.size === 'lg' ? ICON_PAUSE_LG : ICON_PAUSE_SM;
  }

  const ICON_PLAY_LG = '<svg viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>';
  const ICON_PAUSE_LG = '<svg viewBox="0 0 24 24" fill="white"><rect x="6" y="5" width="4" height="14"/><rect x="14" y="5" width="4" height="14"/></svg>';
  const ICON_PLAY_SM = '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>';
  const ICON_PAUSE_SM = '<svg viewBox="0 0 24 24"><rect x="6" y="5" width="4" height="14"/><rect x="14" y="5" width="4" height="14"/></svg>';

  // ---------- Rendering ----------
  function renderSeed(track) {
    const profile = profileFor(track.primaryGenreName);
    seedCard.innerHTML = `
      <img class="seed-art" src="${hiResArt(track.artworkUrl100)}" alt="${escapeHtml(track.trackName)}" loading="lazy">
      <div class="seed-info">
        <div class="seed-title">${escapeHtml(track.trackName)}</div>
        <div class="seed-artist">${escapeHtml(track.artistName)}${track.collectionName ? ' · ' + escapeHtml(track.collectionName) : ''}</div>
        <div class="seed-tags">
          <span class="tag">${escapeHtml(track.primaryGenreName || 'Unknown genre')}</span>
          <span class="tag">${profile.mood}</span>
          ${track.releaseDate ? `<span class="tag">${new Date(track.releaseDate).getFullYear()}</span>` : ''}
        </div>
      </div>
    `;
    const playBtn = document.createElement('button');
    playBtn.className = 'play-btn';
    playBtn.dataset.size = 'lg';
    playBtn.innerHTML = ICON_PLAY_LG;
    if (!track.previewUrl) {
      playBtn.style.opacity = '0.35';
      playBtn.style.cursor = 'not-allowed';
      playBtn.title = 'No preview available';
    } else {
      playBtn.addEventListener('click', () => togglePlay(playBtn, track.previewUrl));
    }
    seedCard.appendChild(playBtn);
    seedSection.classList.add('active');
  }

  function renderResults(seed, candidates) {
    resultsGrid.innerHTML = '';

    if (candidates.length === 0) {
      resultsGrid.innerHTML = `
        <div class="empty-state" style="grid-column: 1 / -1;">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="11" cy="11" r="7"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
          <p>No sonic neighbors found. Try a different search.</p>
        </div>
      `;
      resultsSection.classList.add('active');
      return;
    }

    const scored = candidates
      .map(c => ({ track: c, score: similarityScore(seed, c) }))
      .sort((a, b) => b.score - a.score);

    scored.forEach(({ track, score }, i) => {
      const profile = profileFor(track.primaryGenreName);
      const card = document.createElement('div');
      card.className = 'rec-card';
      card.style.animationDelay = (i * 40) + 'ms';

      card.innerHTML = `
        <div class="rec-top">
          <img class="rec-art" src="${hiResArt(track.artworkUrl100)}" alt="${escapeHtml(track.trackName)}" loading="lazy">
          <div class="rec-info">
            <div class="rec-title">${escapeHtml(track.trackName)}</div>
            <div class="rec-artist">${escapeHtml(track.artistName)}</div>
            <div class="rec-genre">${escapeHtml(track.primaryGenreName || '—')}${track.trackTimeMillis ? ' · ' + formatDuration(track.trackTimeMillis) : ''}</div>
          </div>
        </div>
        <div class="match-row">
          <span class="match-label">MATCH</span>
          <div class="match-track"><div class="match-fill" data-target="${score}"></div></div>
          <span class="match-pct">${score}%</span>
        </div>
        <div class="rec-footer">
          <div class="mood-badge">
            <span class="mood-dot" style="background:${profile.color}"></span>
            ${profile.mood}
          </div>
        </div>
      `;

      const footer = card.querySelector('.rec-footer');
      if (track.previewUrl) {
        const btn = document.createElement('button');
        btn.className = 'mini-play';
        btn.dataset.size = 'sm';
        btn.innerHTML = ICON_PLAY_SM;
        btn.addEventListener('click', () => togglePlay(btn, track.previewUrl));
        footer.appendChild(btn);
      } else {
        const span = document.createElement('span');
        span.className = 'no-preview';
        span.textContent = 'NO PREVIEW';
        footer.appendChild(span);
      }

      resultsGrid.appendChild(card);
    });

    resultsSection.classList.add('active');

    // trigger shimmer bar animations after paint
    requestAnimationFrame(() => {
      setTimeout(() => {
        document.querySelectorAll('.match-fill').forEach(el => {
          el.style.width = el.dataset.target + '%';
        });
      }, 60);
    });
  }

  function escapeHtml(str) {
    if (!str) return '';
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  // ---------- Main search flow ----------
  async function runSearch() {
    const query = searchInput.value.trim();
    if (!query) return;

    errorBox.classList.remove('active');
    seedSection.classList.remove('active');
    resultsSection.classList.remove('active');
    statusLine.classList.add('active');
    statusText.textContent = 'Locating seed track…';
    audioPlayer.pause();
    currentPlayingBtn = null;

    try {
      const seedResults = await itunesSearch(query, 'song', 1);
      if (seedResults.length === 0) {
        throw new Error('No track found for "' + query + '". Try a more specific name.');
      }
      const seed = seedResults[0];
      renderSeed(seed);

      statusText.textContent = 'Scanning genre and artist neighbors…';

      // Gather candidate pool: same genre, same artist (other tracks),
      // and a genre-keyword sweep for broader sonic neighbors.
      const genreTerm = seed.primaryGenreName || seed.artistName;
      const [byGenre, byArtist] = await Promise.all([
        itunesSearch(genreTerm, 'song', 40).catch(() => []),
        itunesSearch(seed.artistName, 'song', 15).catch(() => []),
      ]);

      statusText.textContent = 'Scoring similarity…';

      const pool = [...byGenre, ...byArtist];
      const seen = new Set([seed.trackId]);
      const deduped = [];
      for (const t of pool) {
        if (!t.trackId || seen.has(t.trackId)) continue;
        if (!t.trackName || !t.artistName) continue;
        seen.add(t.trackId);
        deduped.push(t);
      }

      const finalCandidates = deduped.slice(0, 60);
      renderResults(seed, finalCandidates.slice(0, 24));

    } catch (err) {
      errorBox.textContent = err.message || 'Something went wrong while searching.';
      errorBox.classList.add('active');
    } finally {
      statusLine.classList.remove('active');
    }
  }

  searchBtn.addEventListener('click', runSearch);
  searchInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') runSearch();
  });

  // Seed with an initial example on load
  window.addEventListener('DOMContentLoaded', () => {
    searchInput.focus();
  });
})();
</script>

</body>
</html>
