<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1F4D2E">
<title>Focus Garden</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath fill='%231F4D2E' d='M12 3C6 3 3 8 3 13c0 4 3 8 9 8s9-4 9-8c0-5-3-10-9-10z'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,600;0,700;1,500&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --canvas:#F6F9F4;
    --surface:#FFFFFF;
    --forest:#1F4D2E;
    --meadow:#4F8F5E;
    --sprout:#7FC98A;
    --bark:#6B5940;
    --pale:#E3F1E4;
    --pale-2:#EFF8F0;
    --text:#24332B;
    --text-soft:#5C6B5F;
    --wilt:#B08968;
    --shadow:0 10px 30px rgba(31,77,46,.08), 0 2px 8px rgba(31,77,46,.06);
    --ease-out:cubic-bezier(.22,1,.36,1);
    --ease-back:cubic-bezier(.34,1.4,.64,1);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--canvas);
    color:var(--text);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    overflow-x:hidden;
  }
  .bg-blob{
    position:fixed;
    border-radius:50%;
    filter:blur(70px);
    pointer-events:none;
    z-index:0;
  }
  .bg-blob.a{ width:340px; height:340px; background:var(--sprout); opacity:.14; top:-120px; left:-100px; }
  .bg-blob.b{ width:300px; height:300px; background:var(--meadow); opacity:.10; bottom:-100px; right:-100px; }

  .app{
    width:100%;
    max-width:460px;
    position:relative;
    z-index:1;
    padding:24px 20px 56px;
    display:flex;
    flex-direction:column;
    gap:28px;
  }

  /* ===== Header ===== */
  header{ display:flex; align-items:center; justify-content:space-between; }
  .brand{ display:flex; align-items:center; gap:8px; }
  .brand svg{ width:22px; height:22px; color:var(--forest); }
  .brand span{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:19px;
    color:var(--forest);
    letter-spacing:.2px;
  }
  .stats{ display:flex; gap:8px; }
  .stat-pill{
    display:flex; align-items:center; gap:5px;
    background:var(--pale);
    color:var(--forest);
    border-radius:999px;
    padding:6px 11px;
    font-size:13px;
    font-weight:700;
  }
  .stat-pill svg{ width:14px; height:14px; }

  /* ===== Timer Card ===== */
  .timer-card{
    background:var(--surface);
    border-radius:28px;
    box-shadow:var(--shadow);
    padding:30px 22px 26px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:18px;
  }
  .session-pill{
    background:var(--pale);
    color:var(--forest);
    font-size:11px;
    font-weight:800;
    letter-spacing:1.4px;
    text-transform:uppercase;
    padding:7px 16px;
    border-radius:999px;
  }

  .ring-wrap{ position:relative; width:250px; height:250px; }
  .ring-wrap svg.ring{ position:absolute; inset:0; width:100%; height:100%; transform:rotate(0deg); }
  .ring-bg{ fill:none; stroke:var(--pale); stroke-width:11; }
  .ring-progress{ fill:none; stroke:url(#ringGrad); stroke-width:11; stroke-linecap:round; transition:stroke-dashoffset .4s linear, opacity .4s ease; }
  .ring-wrap.is-break .ring-progress{ opacity:.55; }

  .tree-slot{ position:absolute; top:16px; left:16px; right:16px; bottom:54px; }
  #growingTreeWrap{
    width:100%; height:100%;
    transition:transform .9s var(--ease-back), filter .9s ease, opacity .5s ease .35s;
  }
  #growingTreeWrap.wilting{
    transform:rotate(7deg) scaleY(.82) translateY(4px);
    filter:grayscale(.75) saturate(.45) brightness(.85);
    opacity:0;
  }
  #growingTree{ width:100%; height:100%; overflow:visible; }

  .tree-part{ transform-box:fill-box; }
  #sprout{ transition:opacity .4s ease; }
  #trunk{ transform-origin:50% 100%; transition:transform .6s var(--ease-out), opacity .3s ease; }
  #branch-l{ transform-origin:100% 100%; transition:transform .5s var(--ease-out), opacity .3s ease; }
  #branch-r{ transform-origin:0% 100%; transition:transform .5s var(--ease-out), opacity .3s ease; }
  #foliage-1,#foliage-2,#foliage-3,#foliage-4{ transform-origin:50% 50%; transition:transform .6s var(--ease-back), opacity .4s ease; }
  #blossoms{ transition:opacity .5s ease; }

  .break-icon{
    position:absolute; inset:0;
    display:none;
    align-items:center; justify-content:center;
  }
  .ring-wrap.is-break .break-icon{ display:flex; }
  .ring-wrap.is-break #growingTreeWrap{ display:none; }
  .break-icon svg{ width:46px; height:46px; color:var(--meadow); animation:pulse 2.2s ease-in-out infinite; }
  @keyframes pulse{ 0%,100%{ opacity:.35; transform:scale(1);} 50%{ opacity:.75; transform:scale(1.1);} }

  .timer-text{
    position:absolute; left:0; right:0; bottom:20px;
    text-align:center;
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:34px;
    color:var(--forest);
    font-variant-numeric:tabular-nums;
  }

  .chips{ display:flex; flex-wrap:wrap; gap:8px; justify-content:center; transition:opacity .25s ease; }
  .chips.disabled{ opacity:.45; pointer-events:none; }
  .chip{
    background:var(--surface);
    border:2px solid var(--pale);
    color:var(--text-soft);
    font-family:inherit;
    font-weight:700;
    font-size:13px;
    padding:7px 15px;
    border-radius:999px;
    cursor:pointer;
    transition:all .2s ease;
  }
  .chip.active{ background:var(--forest); border-color:var(--forest); color:#fff; }
  .chip:hover:not(.active){ border-color:var(--meadow); color:var(--forest); }

  .controls{ display:flex; gap:10px; align-items:center; }
  .btn-primary{
    display:flex; align-items:center; gap:8px;
    background:var(--forest);
    color:#fff;
    font-family:inherit; font-weight:800; font-size:15px;
    border:none; border-radius:999px;
    padding:13px 28px;
    cursor:pointer;
    box-shadow:0 8px 20px rgba(31,77,46,.25);
    transition:transform .15s var(--ease-out), box-shadow .15s ease;
  }
  .btn-primary:hover{ transform:translateY(-2px); box-shadow:0 10px 24px rgba(31,77,46,.32); }
  .btn-primary:active{ transform:translateY(0) scale(.97); }
  .btn-primary svg{ width:15px; height:15px; }
  .btn-secondary{
    background:transparent;
    color:var(--text-soft);
    font-family:inherit; font-weight:700; font-size:14px;
    border:2px solid var(--pale);
    border-radius:999px;
    padding:11px 20px;
    cursor:pointer;
    transition:all .2s ease;
  }
  .btn-secondary:hover{ border-color:var(--wilt); color:var(--wilt); }

  .cycle-dots{ display:flex; gap:6px; }
  .dot{ width:7px; height:7px; border-radius:50%; background:var(--pale); transition:background .3s ease; }
  .dot.filled{ background:var(--forest); }

  /* ===== Garden ===== */
  .garden-head{ display:flex; align-items:baseline; justify-content:space-between; margin-bottom:12px; }
  .garden-head h2{
    font-family:'Fraunces',serif; font-style:italic; font-weight:600;
    font-size:19px; color:var(--forest); margin:0;
  }
  .garden-head p{ margin:0; font-size:12.5px; color:var(--text-soft); font-weight:500; }

  .garden-bed{
    background:linear-gradient(to bottom, var(--pale-2), var(--pale));
    border-radius:20px;
    min-height:150px;
    padding:18px 14px 10px;
    display:flex;
    flex-wrap:wrap;
    align-items:flex-end;
    box-shadow:inset 0 -3px 0 rgba(31,77,46,.06);
  }
  .garden-tree{ margin:0 -3px; }
  .garden-tree svg{ display:block; }
  .garden-tree.pop-in{ animation:plantPop .55s var(--ease-back) both; }
  @keyframes plantPop{
    0%{ transform:scale(0) rotate(calc(var(--rot) - 12deg)); opacity:0; }
    65%{ transform:scale(1.08) rotate(var(--rot)); opacity:1; }
    100%{ transform:scale(1) rotate(var(--rot)) translateY(var(--ty)); opacity:1; }
  }

  .garden-empty{
    width:100%; text-align:center;
    padding:22px 10px 14px;
    color:var(--text-soft);
    font-size:13.5px;
  }
  .garden-empty svg{ width:26px; height:26px; color:var(--meadow); margin-bottom:6px; }

  /* ===== Modal ===== */
  .modal-overlay{
    position:fixed; inset:0;
    background:rgba(31,77,46,.35);
    backdrop-filter:blur(4px);
    display:flex; align-items:center; justify-content:center;
    padding:20px;
    z-index:100;
    opacity:0; pointer-events:none;
    transition:opacity .25s ease;
  }
  .modal-overlay.show{ opacity:1; pointer-events:auto; }
  .modal-card{
    background:var(--surface);
    border-radius:22px;
    padding:28px 26px 24px;
    max-width:300px;
    width:100%;
    text-align:center;
    box-shadow:var(--shadow);
    transform:scale(.92);
    transition:transform .25s var(--ease-back);
  }
  .modal-overlay.show .modal-card{ transform:scale(1); }
  .modal-card svg{ width:34px; height:34px; color:var(--wilt); margin-bottom:10px; }
  .modal-card h3{ margin:0 0 8px; font-family:'Fraunces',serif; font-weight:600; font-size:18px; color:var(--forest); }
  .modal-card p{ margin:0 0 20px; font-size:13.5px; color:var(--text-soft); line-height:1.5; }
  .modal-actions{ display:flex; gap:10px; }
  .modal-actions button{ flex:1; }

  /* ===== Toast ===== */
  .toast{
    position:fixed; bottom:22px; left:50%;
    transform:translateX(-50%) translateY(90px);
    background:var(--forest); color:#fff;
    font-weight:700; font-size:13.5px;
    padding:13px 22px; border-radius:999px;
    box-shadow:0 10px 26px rgba(31,77,46,.3);
    opacity:0; z-index:200;
    transition:transform .35s var(--ease-back), opacity .3s ease;
    max-width:88vw; text-align:center;
  }
  .toast.show{ transform:translateX(-50%) translateY(0); opacity:1; }

  a:focus-visible, button:focus-visible, .chip:focus-visible{
    outline:2px solid var(--meadow); outline-offset:2px;
  }

  @media (max-width:380px){
    .ring-wrap{ width:220px; height:220px; }
    .timer-text{ font-size:29px; }
    .brand span{ font-size:17px; }
  }

  @media (prefers-reduced-motion:reduce){
    *{ animation-duration:.001s !important; transition-duration:.001s !important; }
  }
</style>
</head>
<body>

<div class="bg-blob a"></div>
<div class="bg-blob b"></div>

<div class="app">

  <header>
    <div class="brand">
      <svg viewBox="0 0 24 24"><path fill="currentColor" d="M12 3C6 3 3 8 3 13c0 4 3 8 9 8s9-4 9-8c0-5-3-10-9-10z"/><path stroke="#fff" stroke-width="1" stroke-linecap="round" opacity=".5" d="M12 6v13"/></svg>
      <span>Focus Garden</span>
    </div>
    <div class="stats">
      <div class="stat-pill">
        <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="9" r="7"/><rect x="10.5" y="15" width="3" height="6" rx="1"/></svg>
        <span id="treesCount">0</span>
      </div>
      <div class="stat-pill">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2c1 4-3 5-3 9a3 3 0 006 0c0-2-1-3-1-3 2 1 4 4 4 7a6 6 0 01-12 0c0-6 4-8 6-13z"/></svg>
        <span id="streakCount">0</span>
      </div>
    </div>
  </header>

  <section class="timer-card">
    <div class="session-pill" id="sessionLabel">Focus Time</div>

    <div class="ring-wrap" id="ringWrap">
      <svg class="ring" viewBox="0 0 260 260">
        <defs>
          <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#4F8F5E"/>
            <stop offset="100%" stop-color="#7FC98A"/>
          </linearGradient>
        </defs>
        <circle class="ring-bg" cx="130" cy="130" r="115"/>
        <circle class="ring-progress" id="ringProgress" cx="130" cy="130" r="115" transform="rotate(-90 130 130)"/>
      </svg>

      <div class="tree-slot">
        <div id="growingTreeWrap">
          <svg id="growingTree" viewBox="0 0 200 220" preserveAspectRatio="xMidYMax meet">
            <ellipse cx="100" cy="211" rx="42" ry="5" fill="rgba(31,77,46,.08)"/>
            <ellipse cx="100" cy="207" rx="48" ry="8" fill="var(--pale)"/>

            <g id="sprout" class="tree-part">
              <path d="M100,206 L100,186" stroke="var(--meadow)" stroke-width="4" stroke-linecap="round"/>
              <ellipse cx="93" cy="190" rx="7" ry="4" fill="var(--sprout)" transform="rotate(-30 93 190)"/>
              <ellipse cx="108" cy="187" rx="7" ry="4" fill="var(--sprout)" transform="rotate(25 108 187)"/>
            </g>

            <g id="trunk" class="tree-part">
              <path d="M 92,206 C 90,180 93,145 96,112 L 104,112 C 107,145 110,180 108,206 Z" fill="var(--bark)"/>
            </g>
            <g id="branch-l" class="tree-part">
              <path d="M 96,152 Q 76,142 63,118" stroke="var(--bark)" stroke-width="7" stroke-linecap="round" fill="none"/>
            </g>
            <g id="branch-r" class="tree-part">
              <path d="M 104,146 Q 126,132 140,108" stroke="var(--bark)" stroke-width="7" stroke-linecap="round" fill="none"/>
            </g>

            <g id="foliage-1" class="tree-part"><circle cx="82" cy="104" r="40" fill="var(--forest)" fill-opacity=".9"/></g>
            <g id="foliage-2" class="tree-part"><circle cx="122" cy="100" r="38" fill="var(--meadow)"/></g>
            <g id="foliage-3" class="tree-part"><circle cx="100" cy="76" r="42" fill="var(--sprout)"/></g>
            <g id="foliage-4" class="tree-part"><circle cx="100" cy="56" r="20" fill="var(--sprout)"/></g>

            <g id="blossoms" class="tree-part">
              <circle cx="88" cy="68" r="3" fill="#fff" fill-opacity=".85"/>
              <circle cx="112" cy="64" r="3" fill="#fff" fill-opacity=".85"/>
              <circle cx="100" cy="50" r="3" fill="#fff" fill-opacity=".85"/>
              <circle cx="78" cy="90" r="2.5" fill="#fff" fill-opacity=".85"/>
              <circle cx="124" cy="86" r="2.5" fill="#fff" fill-opacity=".85"/>
            </g>
          </svg>
        </div>
        <div class="break-icon">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3C6 3 3 8 3 13c0 4 3 8 9 8s9-4 9-8c0-5-3-10-9-10z"/></svg>
        </div>
      </div>

      <div class="timer-text" id="timerText">25:00</div>
    </div>

    <div class="chips" id="durationChips">
      <button class="chip" data-duration="15">15m</button>
      <button class="chip active" data-duration="25">25m</button>
      <button class="chip" data-duration="45">45m</button>
      <button class="chip" data-duration="60">60m</button>
    </div>

    <div class="controls">
      <button class="btn-primary" id="startPauseBtn">
        <span id="playPauseIcon"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></span>
        <span id="playPauseLabel">Start</span>
      </button>
      <button class="btn-secondary" id="giveUpBtn">Give Up</button>
    </div>

    <div class="cycle-dots" id="cycleDots">
      <span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span>
    </div>
  </section>

  <section class="garden">
    <div class="garden-head">
      <h2>Your garden</h2>
      <p id="gardenSubtext">0 trees planted</p>
    </div>
    <div class="garden-bed" id="gardenBed">
      <div class="garden-empty" id="gardenEmpty">
        <svg viewBox="0 0 24 24"><ellipse cx="12" cy="12" rx="6" ry="9" fill="currentColor" opacity=".35"/></svg>
        <div>Finish a focus session to plant your first tree</div>
      </div>
    </div>
  </section>

</div>

<div class="modal-overlay" id="wiltModal">
  <div class="modal-card">
    <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="9" r="7"/><rect x="10.5" y="15" width="3" height="6" rx="1"/></svg>
    <h3>Give up on this session?</h3>
    <p>Your growing tree will wilt and won't be added to the garden.</p>
    <div class="modal-actions">
      <button class="btn-secondary" id="modalCancel">Keep going</button>
      <button class="btn-primary" id="modalConfirm" style="background:var(--wilt); box-shadow:none;">Give up</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  "use strict";

  /* ===== Constants ===== */
  const BREAK = 5*60;
  const LONG_BREAK = 15*60;
  const RADIUS = 115;
  const CIRC = 2*Math.PI*RADIUS;
  const PLAY_ICON = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';
  const PAUSE_ICON = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>';

  const GARDEN_TREE_SVG = `
    <svg viewBox="0 0 200 220" width="56" height="61.6">
      <ellipse cx="100" cy="207" rx="48" ry="8" fill="var(--pale)"/>
      <path d="M 92,206 C 90,180 93,145 96,112 L 104,112 C 107,145 110,180 108,206 Z" fill="var(--bark)"/>
      <path d="M 96,152 Q 76,142 63,118" stroke="var(--bark)" stroke-width="7" stroke-linecap="round" fill="none"/>
      <path d="M 104,146 Q 126,132 140,108" stroke="var(--bark)" stroke-width="7" stroke-linecap="round" fill="none"/>
      <circle cx="82" cy="104" r="40" fill="var(--forest)" fill-opacity=".9"/>
      <circle cx="122" cy="100" r="38" fill="var(--meadow)"/>
      <circle cx="100" cy="76" r="42" fill="var(--sprout)"/>
      <circle cx="100" cy="56" r="20" fill="var(--sprout)"/>
      <circle cx="88" cy="68" r="3" fill="#fff" fill-opacity=".85"/>
      <circle cx="112" cy="64" r="3" fill="#fff" fill-opacity=".85"/>
      <circle cx="100" cy="50" r="3" fill="#fff" fill-opacity=".85"/>
    </svg>`;

  /* ===== State ===== */
  const state = {
    duration: 25*60,
    timeLeft: 25*60,
    sessionType: "focus", // focus | break | longBreak
    isRunning: false,
    isTransitioning: false,
    intervalId: null,
    cycleCount: 0,
    streak: 0,
    trees: []
  };

  /* ===== DOM refs ===== */
  const els = {
    sprout: document.getElementById("sprout"),
    trunk: document.getElementById("trunk"),
    branchL: document.getElementById("branch-l"),
    branchR: document.getElementById("branch-r"),
    foliage1: document.getElementById("foliage-1"),
    foliage2: document.getElementById("foliage-2"),
    foliage3: document.getElementById("foliage-3"),
    foliage4: document.getElementById("foliage-4"),
    blossoms: document.getElementById("blossoms")
  };

  const ringWrap = document.getElementById("ringWrap");
  const ringProgress = document.getElementById("ringProgress");
  const growingTreeWrap = document.getElementById("growingTreeWrap");
  const timerText = document.getElementById("timerText");
  const sessionLabel = document.getElementById("sessionLabel");
  const chips = Array.from(document.querySelectorAll(".chip"));
  const chipsWrap = document.getElementById("durationChips");
  const startPauseBtn = document.getElementById("startPauseBtn");
  const playPauseIcon = document.getElementById("playPauseIcon");
  const playPauseLabel = document.getElementById("playPauseLabel");
  const giveUpBtn = document.getElementById("giveUpBtn");
  const cycleDots = Array.from(document.querySelectorAll(".dot"));
  const treesCountEl = document.getElementById("treesCount");
  const streakEl = document.getElementById("streakCount");
  const gardenBed = document.getElementById("gardenBed");
  const gardenEmpty = document.getElementById("gardenEmpty");
  const gardenSubtext = document.getElementById("gardenSubtext");
  const wiltModal = document.getElementById("wiltModal");
  const modalCancel = document.getElementById("modalCancel");
  const modalConfirm = document.getElementById("modalConfirm");
  const toast = document.getElementById("toast");

  ringProgress.style.strokeDasharray = CIRC;

  /* ===== Helpers ===== */
  function clamp(v,min,max){ return Math.max(min, Math.min(max, v)); }
  function mapRange(v, inMin, inMax, outMin, outMax){
    if (inMax === inMin) return outMax;
    let t = (v - inMin) / (inMax - inMin);
    t = clamp(t, 0, 1);
    return outMin + t*(outMax - outMin);
  }
  function formatTime(s){
    const m = Math.floor(s/60), sec = s%60;
    return String(m).padStart(2,"0") + ":" + String(sec).padStart(2,"0");
  }
  function sessionTotal(){
    if (state.sessionType === "focus") return state.duration;
    if (state.sessionType === "break") return BREAK;
    return LONG_BREAK;
  }
  function seededRand(i){
    const x = Math.sin(i*12.9898 + 78.233) * 43758.5453;
    return x - Math.floor(x);
  }

  /* ===== Tree growth ===== */
  function updateTreeGrowth(p){
    const sproutOp = p<=0 ? 0 : (p<0.24 ? 1 : mapRange(p,0.24,0.34,1,0));
    els.sprout.style.opacity = sproutOp;

    const trunkScale = mapRange(p,0.03,0.55,0,1);
    const trunkOp = mapRange(p,0.03,0.10,0,1);
    els.trunk.style.transform = "scaleY(" + trunkScale + ")";
    els.trunk.style.opacity = trunkOp;

    const blScale = mapRange(p,0.28,0.62,0,1);
    const blOp = mapRange(p,0.28,0.35,0,1);
    els.branchL.style.transform = "scale(" + blScale + ")";
    els.branchL.style.opacity = blOp;

    const brScale = mapRange(p,0.32,0.65,0,1);
    const brOp = mapRange(p,0.32,0.39,0,1);
    els.branchR.style.transform = "scale(" + brScale + ")";
    els.branchR.style.opacity = brOp;

    [[els.foliage1,0.42,0.72],[els.foliage2,0.47,0.75],[els.foliage3,0.52,0.80],[els.foliage4,0.62,0.85]].forEach(function(row){
      const el = row[0], a = row[1], b = row[2];
      const v = mapRange(p,a,b,0,1);
      el.style.transform = "scale(" + v + ")";
      el.style.opacity = v;
    });

    els.blossoms.style.opacity = mapRange(p,0.88,1.0,0,1);
  }
  function resetTreeVisual(){ updateTreeGrowth(0); }

  /* ===== Progress ring ===== */
  function updateRing(p){
    ringProgress.style.strokeDashoffset = CIRC * (1-p);
  }

  /* ===== UI updates ===== */
  function updateSessionLabel(){
    sessionLabel.textContent = state.sessionType === "focus" ? "Focus Time"
      : state.sessionType === "break" ? "Short Break" : "Long Break";
    ringWrap.classList.toggle("is-break", state.sessionType !== "focus");
  }
  function updateControlsUI(){
    playPauseIcon.innerHTML = state.isRunning ? PAUSE_ICON : PLAY_ICON;
    playPauseLabel.textContent = state.isRunning ? "Pause" : "Start";
    giveUpBtn.textContent = state.sessionType === "focus" ? "Give Up" : "Skip Break";
    chipsWrap.classList.toggle("disabled", state.isRunning || state.timeLeft !== state.duration || state.sessionType !== "focus");
  }
  function updateStatsUI(){
    treesCountEl.textContent = state.trees.length;
    streakEl.textContent = state.streak;
    const mins = state.trees.reduce(function(sum,t){ return sum + t.duration/60; }, 0);
    gardenSubtext.textContent = state.trees.length + (state.trees.length===1?" tree":" trees") + " planted \u00b7 " + Math.round(mins) + " min focused";
  }
  function updateCycleDots(){
    const filled = state.cycleCount % 4;
    cycleDots.forEach(function(d,i){ d.classList.toggle("filled", i < filled); });
  }

  /* ===== Garden ===== */
  function plantTree(durationSeconds){
    state.trees.push({ duration: durationSeconds });
    const idx = state.trees.length - 1;

    const mult = durationSeconds >= 60*60 ? 1.3 : durationSeconds >= 45*60 ? 1.15 : durationSeconds >= 25*60 ? 1.0 : 0.85;
    const size = 56 * mult;
    const rot = (seededRand(idx) - 0.5) * 12;
    const ty = seededRand(idx+50) * 6;

    const wrap = document.createElement("div");
    wrap.className = "garden-tree pop-in";
    wrap.style.setProperty("--rot", rot + "deg");
    wrap.style.setProperty("--ty", ty + "px");
    wrap.innerHTML = GARDEN_TREE_SVG.replace('width="56" height="61.6"', 'width="' + size + '" height="' + (size*1.1) + '"');

    gardenBed.appendChild(wrap);
    gardenEmpty.style.display = "none";
    updateStatsUI();
  }

  /* ===== Timer core ===== */
  function tick(){
    state.timeLeft--;
    const total = sessionTotal();
    const progress = 1 - state.timeLeft/total;
    timerText.textContent = formatTime(Math.max(0,state.timeLeft));
    updateRing(progress);
    if (state.sessionType === "focus") updateTreeGrowth(progress);
    if (state.timeLeft <= 0) completeSession();
  }
  function startTimer(){
    if (state.isRunning || state.isTransitioning) return;
    state.isRunning = true;
    state.intervalId = setInterval(tick, 1000);
    updateControlsUI();
  }
  function pauseTimer(){
    state.isRunning = false;
    clearInterval(state.intervalId);
    updateControlsUI();
  }
  function performReset(){
    pauseTimer();
    state.sessionType = "focus";
    state.timeLeft = state.duration;
    timerText.textContent = formatTime(state.timeLeft);
    updateRing(0);
    resetTreeVisual();
    updateSessionLabel();
    updateControlsUI();
  }
  function completeSession(){
    pauseTimer();
    if (state.sessionType === "focus"){
      plantTree(state.duration);
      state.streak++;
      state.cycleCount++;
      showToast("Nice work \u2014 your tree is planted.");
      const isLong = state.cycleCount % 4 === 0;
      state.sessionType = isLong ? "longBreak" : "break";
      state.timeLeft = isLong ? LONG_BREAK : BREAK;
    } else {
      showToast("Break's over \u2014 ready to focus?");
      state.sessionType = "focus";
      state.timeLeft = state.duration;
      resetTreeVisual();
    }
    timerText.textContent = formatTime(state.timeLeft);
    updateRing(0);
    updateSessionLabel();
    updateStatsUI();
    updateCycleDots();
    updateControlsUI();
  }

  /* ===== Give up / wilt ===== */
  function requestGiveUp(){
    if (state.isTransitioning) return;
    const total = sessionTotal();
    const progress = 1 - state.timeLeft/total;
    if (state.sessionType === "focus" && progress > 0.03){
      wiltModal.classList.add("show");
    } else {
      performReset();
    }
  }
  function hideModal(){ wiltModal.classList.remove("show"); }
  function confirmGiveUp(){
    hideModal();
    if (state.sessionType !== "focus"){ performReset(); return; }
    pauseTimer();
    state.streak = 0;
    state.isTransitioning = true;
    growingTreeWrap.classList.add("wilting");
    setTimeout(function(){
      growingTreeWrap.classList.remove("wilting");
      state.isTransitioning = false;
      performReset();
    }, 950);
  }

  /* ===== Toast ===== */
  let toastTimeout;
  function showToast(msg){
    toast.textContent = msg;
    toast.classList.add("show");
    clearTimeout(toastTimeout);
    toastTimeout = setTimeout(function(){ toast.classList.remove("show"); }, 2600);
  }

  /* ===== Events ===== */
  chips.forEach(function(chip){
    chip.addEventListener("click", function(){
      if (state.isRunning || state.sessionType !== "focus" || state.timeLeft !== state.duration) return;
      const val = parseInt(chip.dataset.duration,10) * 60;
      state.duration = val;
      state.timeLeft = val;
      timerText.textContent = formatTime(val);
      chips.forEach(function(c){ c.classList.remove("active"); });
      chip.classList.add("active");
    });
  });
  startPauseBtn.addEventListener("click", function(){
    if (state.isTransitioning) return;
    state.isRunning ? pauseTimer() : startTimer();
  });
  giveUpBtn.addEventListener("click", requestGiveUp);
  modalCancel.addEventListener("click", hideModal);
  modalConfirm.addEventListener("click", confirmGiveUp);

  /* ===== Init ===== */
  resetTreeVisual();
  updateRing(0);
  updateSessionLabel();
  updateControlsUI();
  updateStatsUI();
  updateCycleDots();
  timerText.textContent = formatTime(state.timeLeft);

})();
</script>
</body>
</html>
